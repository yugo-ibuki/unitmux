  </defs>
  <!-- Background -->
  <rect width="80" height="80" rx="18" fill="url(#bg)"/>
  <!-- Keys -->
  <rect x="6"  y="20" width="12" height="12" rx="3" fill="rgba(255,255,255,0.9)" stroke="rgba(99,102,241,0.2)" stroke-width="0.5"/>
  <rect x="22" y="20" width="12" height="12" rx="3" fill="rgba(255,255,255,0.9)" stroke="rgba(99,102,241,0.2)" stroke-width="0.5"/>
  <rect x="38" y="20" width="12" height="12" rx="3" fill="rgba(255,255,255,0.9)" stroke="rgba(99,102,241,0.2)" stroke-width="0.5"/>
  <rect x="54" y="20" width="12" height="12" rx="3" fill="rgba(255,255,255,0.9)" stroke="rgba(99,102,241,0.2)" stroke-width="0.5"/>
  <!-- Spacebar -->
  <rect x="6" y="40" width="60" height="22" rx="6" fill="#4ade80"/>
</svg>
